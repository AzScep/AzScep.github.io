<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do You Love Me? 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Bubblegum Sans', cursive;
      overflow: hidden;
      transition: background 1s ease;
    }

    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .float-heart {
      position: fixed;
      bottom: -50px;
      animation: floatUp linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0.8;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(720deg) scale(0.3);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 10;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .container.hidden {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 45px 55px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
      max-width: 500px;
      width: 90vw;
      position: relative;
      overflow: visible;
    }

    .card.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px) rotate(-1deg); }
      40% { transform: translateX(8px) rotate(1deg); }
      60% { transform: translateX(-5px) rotate(-0.5deg); }
      80% { transform: translateX(5px) rotate(0.5deg); }
    }

    .top-emoji {
      font-size: 4.5rem;
      margin-bottom: 10px;
      display: block;
      transition: all 0.3s ease;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      color: #e74c7d;
      font-size: 2.5rem;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      color: #999;
      font-size: 1.15rem;
      min-height: 28px;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 120px;
    }

    button {
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-family: 'Bubblegum Sans', cursive;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      position: relative;
    }

    #yes-btn {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      box-shadow: 0 5px 20px rgba(67, 233, 123, 0.4);
      animation: pulse 2s infinite;
      transform-origin: top center;
    }

    #yes-btn:hover {
      box-shadow: 0 8px 30px rgba(67, 233, 123, 0.6);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(var(--yes-scale, 1)); }
      50% { transform: scale(calc(var(--yes-scale, 1) * 1.05)); }
    }

    #no-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
      z-index: 50;
    }

    #no-btn.runaway {
      position: absolute;
      transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.3s ease,
                  padding 0.3s ease,
                  font-size 0.3s ease;
    }

    /* Celebration */
    .celebration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .celebration.active {
      opacity: 1;
      pointer-events: auto;
    }

    .celebration h1 {
      font-family: 'Pacifico', cursive;
      color: white;
      font-size: 3.2rem;
      text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.8s ease forwards;
      margin-bottom: 15px;
    }

    .celebration .sub-text {
      font-size: 1.4rem;
      color: white;
      text-shadow: 1px 1px 8px rgba(0, 0, 0, 0.15);
      animation: fadeInUp 0.8s ease 0.3s forwards;
      opacity: 0;
      margin-bottom: 25px;
    }

    .celebration .big-heart {
      font-size: 8rem;
      animation: celebrationPulse 1s infinite, fadeInUp 0.8s ease 0.5s forwards;
      opacity: 0;
      filter: drop-shadow(0 5px 20px rgba(255, 0, 80, 0.3));
    }

    .celebration .love-text {
      font-size: 1.6rem;
      color: white;
      font-family: 'Pacifico', cursive;
      text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.8s ease 2s forwards;
      opacity: 0;
      margin-top: 20px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes celebrationPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    .emoji-rain {
      position: fixed;
      top: -60px;
      font-size: 2rem;
      pointer-events: none;
      z-index: 90;
      animation: emojiRain linear forwards;
    }

    @keyframes emojiRain {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      85% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .card {
        padding: 30px 25px;
      }

      h1 {
        font-size: 1.9rem;
      }

      .top-emoji {
        font-size: 3.5rem;
      }

      button {
        padding: 12px 28px;
        font-size: 1.05rem;
      }

      .buttons {
        gap: 15px;
      }

      .celebration h1 {
        font-size: 2.2rem;
      }

      .celebration .big-heart {
        font-size: 5rem;
      }

      .celebration .sub-text,
      .celebration .love-text {
        font-size: 1.1rem;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <div class="floating-hearts" id="floating-hearts"></div>

  <div class="container" id="main-container">
    <div class="card" id="card">
      <span class="top-emoji" id="top-emoji">🥺</span>
      <h1>Do you love me?</h1>
      <p class="subtitle" id="subtitle">Please say yes...</p>
      <div class="buttons">
        <button id="yes-btn">Yes! 💖</button>
        <button id="no-btn">No 💔</button>
      </div>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <h1>I knew it! 🥰💕</h1>
    <p class="sub-text">You just made me the happiest person in the world!</p>
    <div class="big-heart">💖</div>
    <p class="love-text">I love you too! 💕</p>
  </div>

  <script>
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const card = document.getElementById('card');
    const container = document.getElementById('main-container');
    const celebration = document.getElementById('celebration');
    const subtitle = document.getElementById('subtitle');
    const topEmoji = document.getElementById('top-emoji');

    let noHoverCount = 0;
    let yesScale = 1;
    let isRunaway = false;

    const messages = [
      { text: "Are you sure?! 🥺", emoji: "😢" },
      { text: "Think again!", emoji: "😭" },
      { text: "Don't do this to me!", emoji: "💔" },
      { text: "I'll be so sad...", emoji: "😿" },
      { text: "You're breaking my heart!", emoji: "😩" },
      { text: "Please reconsider!", emoji: "🥹" },
      { text: "I won't give up!", emoji: "😤" },
      { text: "Pretty please? 🙏", emoji: "🙏" },
      { text: "Just click Yes already!", emoji: "😅" },
      { text: "The Yes button looks nice, right? 👉", emoji: "👀" },
      { text: "PLEASEEE!", emoji: "😭" },
      { text: "I'm not gonna stop!", emoji: "🫣" },
    ];

    const noTexts = ["No 💔", "Noo 💔", "Nooo 💔", "Noooo 💔", "Stop it! 😭", "Why?! 😭", "...fine 🥺"];

    // --- Runaway No Button ---
    const buttonsContainer = document.querySelector('.buttons');

    function runAway(e) {
      e.preventDefault();
      noHoverCount++;

      // Make it absolutely positioned within .buttons on first hover
      if (!isRunaway) {
        noBtn.classList.add('runaway');
        isRunaway = true;
      }

      // Random size changes for fun
      const sizes = [
        { padding: '8px 20px', fontSize: '0.85rem' },
        { padding: '15px 40px', fontSize: '1.2rem' },
        { padding: '10px 25px', fontSize: '0.95rem' },
        { padding: '18px 50px', fontSize: '1.4rem' },
        { padding: '6px 16px', fontSize: '0.75rem' },
        { padding: '12px 30px', fontSize: '1rem' },
      ];
      const size = sizes[Math.floor(Math.random() * sizes.length)];
      noBtn.style.padding = size.padding;
      noBtn.style.fontSize = size.fontSize;

      // Random position within the card area (use card bounds)
      const cardRect = card.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;
      // Allow movement within a zone slightly larger than the card
      const rangeX = cardRect.width + 80;
      const rangeY = cardRect.height + 60;
      const offsetX = -40 + Math.random() * (rangeX - btnW);
      const offsetY = -30 + Math.random() * (rangeY - btnH);
      noBtn.style.left = offsetX + 'px';
      noBtn.style.top = offsetY + 'px';

      // Grow the Yes button
      yesScale = Math.min(yesScale + 0.2, 3.5);
      yesBtn.style.setProperty('--yes-scale', yesScale);

      // Update messages
      const msg = messages[noHoverCount % messages.length];
      subtitle.textContent = msg.text;
      topEmoji.textContent = msg.emoji;

      // Update No button text
      if (noHoverCount <= noTexts.length) {
        noBtn.textContent = noTexts[Math.min(noHoverCount - 1, noTexts.length - 1)];
      }

      // Shake the card
      card.classList.remove('shake');
      void card.offsetWidth; // force reflow
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
    }

    // Touch & mouse support
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isTouchDevice) {
      noBtn.addEventListener('touchstart', runAway, { passive: false });
    }
    noBtn.addEventListener('mouseenter', runAway);

    // --- Yes Button Celebration ---
    yesBtn.addEventListener('click', function () {
      // Hide question
      container.classList.add('hidden');
      if (isRunaway) noBtn.style.display = 'none';

      // Show celebration
      setTimeout(() => {
        celebration.classList.add('active');
      }, 300);

      // Change background
      document.body.style.background = 'linear-gradient(135deg, #f6d365 0%, #fda085 40%, #f5576c 100%)';

      // Confetti bursts
      if (typeof confetti === 'function') {
        // Big initial burst
        confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 }, colors: ['#ff69b4', '#ff1493', '#ff6b6b', '#ffd700', '#ff85a2'] });

        // Side bursts
        setTimeout(() => {
          confetti({ particleCount: 80, angle: 60, spread: 60, origin: { x: 0, y: 0.6 }, colors: ['#ff69b4', '#ff1493', '#ffd700'] });
          confetti({ particleCount: 80, angle: 120, spread: 60, origin: { x: 1, y: 0.6 }, colors: ['#ff69b4', '#ff1493', '#ffd700'] });
        }, 400);

        // Continuous confetti
        let count = 0;
        const confettiInterval = setInterval(() => {
          confetti({
            particleCount: 25,
            spread: 80,
            origin: { x: Math.random(), y: Math.random() * 0.4 },
            colors: ['#ff69b4', '#ff1493', '#ff6b6b', '#ffd700', '#ff85a2', '#ee82ee']
          });
          count++;
          if (count > 10) clearInterval(confettiInterval);
        }, 350);
      }

      // Emoji rain
      const celebrationEmoji = ['💖', '💕', '🥰', '😍', '✨', '💗', '💓', '🦋', '🌸', '💝'];
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.classList.add('emoji-rain');
          el.textContent = celebrationEmoji[Math.floor(Math.random() * celebrationEmoji.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
          el.style.animationDuration = (3 + Math.random() * 4) + 's';
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, Math.random() * 3000);
      }

      // Extra floating hearts burst
      for (let i = 0; i < 20; i++) {
        setTimeout(() => spawnHeart(true), Math.random() * 2000);
      }
    });

    // --- Ambient Floating Hearts ---
    const heartEmoji = ['💕', '❤️', '💗', '💖', '🩷', '🤍'];

    function spawnHeart(fast) {
      const el = document.createElement('span');
      el.classList.add('float-heart');
      el.textContent = heartEmoji[Math.floor(Math.random() * heartEmoji.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
      el.style.animationDuration = (fast ? 2 + Math.random() * 3 : 5 + Math.random() * 5) + 's';
      document.getElementById('floating-hearts').appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // Spawn ambient hearts
    setInterval(() => spawnHeart(false), 900);
    // Initial batch
    for (let i = 0; i < 5; i++) {
      setTimeout(() => spawnHeart(false), i * 300);
    }
  </script>
</body>
</html>
